pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        flatDir {
            dirs "$rootDir/app/libs", "$rootDir/capacitor-cordova-android-plugins/src/main/libs"
        }
    }
}

rootProject.name = "ThreeP"
include ":app"
apply from: "capacitor.settings.gradle"
