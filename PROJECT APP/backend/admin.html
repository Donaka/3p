<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3P Admin - Dashboard Premium</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="icon" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body class="dark-mode">
    <div id="login-screen" class="screen active">
        <div class="login-card">
            <img src="logo-3p.png" alt="3P Logo" class="login-logo">
            <h1>Administration 3P</h1>
            <div class="input-group">
                <input type="password" id="admin-password" placeholder="Mot de passe admin">
            </div>
            <button id="login-btn" class="primary-btn">Se connecter</button>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="logo-3p.png" alt="3P Logo" class="nav-logo">
                <span>3P Chicken Pops</span>
            </div>
            <ul class="nav-links">
                <li data-tab="dashboard" class="active">Tableau de bord</li>
                <li data-tab="orders">Commandes</li>
                <li data-tab="menu">Menu & Produits</li>
                <li data-tab="settings">Paramètres</li>
                <li data-tab="options">Options</li>
                <li data-tab="push">Notifications</li>
            </ul>
            <div class="sidebar-footer">
                <button id="logout-btn" class="danger-btn">Déconnexion</button>
            </div>
        </nav>
        <main class="content">
            <!-- Content will be dynamically injected by admin.js -->
            <div class="loading-overlay">
                <p>Chargement du dashboard...</p>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <header class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <button class="close-modal">&times;</button>
            </header>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
